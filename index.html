<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game-portfolio</title>
    <script type="importmap">
  {
    "imports": {
      "kaplay": "https://unpkg.com/kaplay@3001/dist/kaplay.mjs"
    }
  }
</script>
  </head>
  <body>

    <div id="intro-overlay">
      <div class="intro-content">
        <h1>EVAN</h1>
        <p>Interactive Portfolio</p>
        <button id="enter-btn">ENTER</button>
      </div>
    </div>

    <style>

      @font-face {
        font-family:monogram;
        src: url("public/monogram.ttf");
      }


      #intro-overlay {
        position: fixed;
        inset: 0; /* Shortcut for top, left, right, bottom: 0 */
        background: #311047; 
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000; 
        transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.5s;
        color: white;
        text-align: center;
      }

      #enter-btn {
        margin-top: 2rem;
        padding: 1rem 2rem;
        font-family: monogram, monospace;
        font-size: 1.5rem;
        background: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        transition: scale 0.2s, background 0.2s;
      }

      #enter-btn:hover {
        scale: 1.1;
        background: #eee;
      }

      /* Class to trigger the "Exit" animation */
      .hidden-overlay {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-100%); /* Slides the curtain up */
      }
      
      body{
        font-family:monogram, monospace;
        font-size: 2rem; 
        overflow:hidden;
      }

      /* Fix the canvas size and prevent stretching */
      #game {
        width: 100%;
        height: 100%;
        image-rendering: pixelated; 
        image-rendering: crisp-edges;
        display: block;
      }

      /* Ensure the app container actually takes up the whole screen */
      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
        background-color: #800080; 
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #textbox{
        position: absolute;
        left:10%;
        right: 10%;
        bottom: 2vh;
        min-height: 10vh;
        background: white;
        border-radius: 3px;
        outline-style: solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
        pointer-events: auto; 
        z-index: 100;
      }

      .ui-text{
        margin:0;
        user-select:none;
      }

      .ui-close-btn{
        font-family: inherit;
        border-style:none;
        border-radius:3px;
        padding: 1rem;
        font-size:inherit;
      }

      .note{
        position:absolute;
        left: 5%;
        top: 1vh;
        display: flex;
        flex-direction: column;
        color: rgb(238, 238, 238);
        user-select:none;
      }
      
      .btn-container{
        align-self: flex-end;
        margin-top: 1rem;
        pointer-events: auto;
        display: flex;

      }
      .resume-link {
        display: inline-block;
        background-color: #333;
        color: white;
        padding: 0.5rem 1rem;
        text-decoration: none;
        border-radius: 3px;
        margin-right: 1rem;
        font-size: 1.5rem;
      }

      .resume-link:hover {
        background-color: #555;
      }


</style>

    <div id="app">
  <canvas id="game"></canvas>

  <div id="ui">
    <p class="note">Tap/Click around to move</p>
    
    <div id="textbox-container" style="display: none">
      <div id="textbox">
        <p id="dialogue" class="ui-text"></p>
        
        <div class="btn-container">
          <a id="resume-link" 
             href="./Resume_Evan Pan.pdf" 
             target="_blank" 
             class="resume-link" 
             style="display: none;">
             Download PDF Resume
          </a>
          
          <button id="close" class="ui-close-btn">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
  </body>
</html>
