<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game-portfolio</title>
    <script type="importmap">
  {
    "imports": {
      "kaplay": "https://unpkg.com/kaplay@3001/dist/kaplay.mjs"
    }
  }
</script>
  </head>
  <body>

    <div id="intro-overlay">
      <div class="intro-content">
        <h1>EVAN</h1>
        <p>Interactive Portfolio</p>
        <button id="enter-btn">ENTER</button>
      </div>
    </div>


    <div id="app">
  <canvas id="game"></canvas>

  <div id="ui">
    <p class="note">Tap/Click around to move<br>
      Space -> interact Enter -> close
    </p>

    
    <div id="textbox-container" style="display: none">
      <div id="textbox">
        <p id="dialogue" class="ui-text"></p>
        
        <div class="btn-container">
          <a id="resume-link" 
             href="./public/Resume_EvanPan.pdf" 
             target="_blank" 
             class="resume-link" 
             style="display: none;">
             Download PDF Resume
          </a>
          
          <button id="close" class="ui-close-btn">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
  </body>
</html>
